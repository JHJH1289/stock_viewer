spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
opendart.api-key=${OPENDART_API_KEY:}
kis.base-url=${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
kis.app-key=${KIS_APP_KEY:}
kis.app-secret=${KIS_APP_SECRET:}
naver.search.client-id=${NAVER_CLIENT_ID:}
naver.search.client-secret=${NAVER_CLIENT_SECRET:}
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:gemma3:4b}
logging.level.root=INFO
logging.level.org.springframework.web.client=INFO
logging.level.org.springframework.web.servlet=INFO

# Oracle Datasource
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521:xe}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stockviewer}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
